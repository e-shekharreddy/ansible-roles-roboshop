- name: enabling redis default
  ansible.builtin.command: dnf module enable redis:7 -y

- name: install redis 7
  ansible.builtin.dnf:
    name: redis
    state: present

- name: changes in file # allow remote connections 
  ansible.builtin.replace:
    path: /etc/redis/redis.conf
    regexp: "127.0.0.1"  # Matches '10.0.1.' (note the escaped dots)
    replace: "0.0.0.0" 
  
- name: Protected mode change
  ansible.builtin.lineinfile:
    path: /etc/redis/redis.conf
    regexp: 'protected-mode'
    line: 'protected-mode no'

- name: enable and start redis
  ansible.builtin.service:
    name: redis
    state: restarted
    enabled: yes