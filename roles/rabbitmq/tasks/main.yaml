- name: copy rabbitmq repo
  ansible.builtin.copy:
    src: rabbitmq.repo
    dest: /etc/yum.repos.d/rabbitmq.repo

- name: insatalling rabbitmq server
  ansible.builtin.dnf:
    name: rabbitmq-server
    state: present

- name: enable and start the rabbitmq server
  ansible.builtin.service:
    name: rabbitmq-server
    state: restarted
    enabled: yes

- name: rabbitmq user creation
  community.rabbitmq.rabbitmq_user:
      user: rabbitmq_user
      password: rabbitmq_password
      permissions:
        - vhost: /
          configure_priv: .*
          read_priv: .*
          write_priv: .*
      state: present
